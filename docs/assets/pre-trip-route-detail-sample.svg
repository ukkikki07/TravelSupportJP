<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Route detail screenshot sample</title>
  <desc id="desc">Illustrative sample showing a zoomed-in transfer or destination area backup before travel.</desc>
