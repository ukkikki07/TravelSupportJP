  <path d="M145 138 V354" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <path d="M110 320 C170 292 226 288 294 270" fill="none" stroke="#1f6feb" stroke-width="6" stroke-linecap="round"/>
  <circle cx="110" cy="320" r="11" fill="#1f6feb"/>
  <path d="M294 218 C270 218 251 237 251 261 C251 293 294 340 294 340 C294 340 337 293 337 261 C337 237 318 218 294 218 Z" fill="#d93025"/>
  <circle cx="294" cy="259" r="14" fill="#ffffff"/>
  <circle cx="294" cy="259" r="7" fill="#d93025"/>
  <rect x="492" y="126" width="180" height="242" rx="8" fill="#ffffff" stroke="#d4dce8"/>
