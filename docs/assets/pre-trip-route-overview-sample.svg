<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Route overview screenshot sample</title>
  <desc id="desc">Illustrative sample showing a zoomed-out route overview backup before travel.</desc>
  <rect width="720" height="420" fill="#f7f8fb"/>
  <rect x="24" y="24" width="672" height="372" rx="18" fill="#ffffff" stroke="#c9d3e0" stroke-width="2"/>
  <rect x="48" y="52" width="624" height="54" rx="8" fill="#eef3fb" stroke="#c9d3e0"/>
  <text x="68" y="86" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#24324a">Route overview / full trip shape</text>
  <rect x="48" y="126" width="420" height="242" rx="8" fill="#e8f1e8" stroke="#b9c8b9"/>
  <path d="M72 172 C128 146 174 153 220 184 S301 236 354 208 S421 173 446 195" fill="none" stroke="#d9e8d9" stroke-width="20" stroke-linecap="round"/>
  <path d="M96 318 C156 283 199 301 260 270 S340 241 446 300" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <path d="M105 322 C165 288 205 302 266 272 S344 246 438 296" fill="none" stroke="#1f6feb" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 10"/>
  <circle cx="105" cy="322" r="12" fill="#1f6feb"/>
  <circle cx="438" cy="296" r="13" fill="#d93025"/>
  <text x="85" y="352" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#24324a">Start area</text>
  <text x="368" y="272" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#24324a">Final area</text>
  <rect x="492" y="126" width="180" height="242" rx="8" fill="#ffffff" stroke="#d4dce8"/>
  <text x="512" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#24324a">Use for:</text>
  <circle cx="520" cy="194" r="5" fill="#1f6feb"/>
  <text x="538" y="200" font-family="Arial, sans-serif" font-size="15" fill="#24324a">Whole trip shape</text>
  <circle cx="520" cy="230" r="5" fill="#1f6feb"/>
  <text x="538" y="236" font-family="Arial, sans-serif" font-size="15" fill="#24324a">Major transfer</text>
  <circle cx="520" cy="266" r="5" fill="#1f6feb"/>
  <text x="538" y="272" font-family="Arial, sans-serif" font-size="15" fill="#24324a">Destination area</text>
  <text x="512" y="330" font-family="Arial, sans-serif" font-size="13" fill="#61708a">Too zoomed out for</text>
  <text x="512" y="350" font-family="Arial, sans-serif" font-size="13" fill="#61708a">platforms or bus stops.</text>
</svg>
